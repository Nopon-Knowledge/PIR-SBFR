model:
  scale_mode: dior
  lambda_scale: 0.1
  lambda_consistency: 0.1
  fach_experts: 3  # K_h is not reported; selected by parameter/FLOP calibration
  router:
    aligned_channels: 64
    num_experts: 4
    visual_hidden_dim: 280
    residual_bound: 4.0
    eta: 1.0
    temperature: 1.0
    eps: 1.0e-6
    physical_fields: [1.0, 1.0, 1.0]
    use_physical: true
    use_visual: true
    p5_bypass: true

degradation:
  enabled: true
  metadata_dropout: 0.25
  blur_range: [0.15, 0.45]
  snr_range: [10.0, 28.0]
  mode_probabilities: [0.35, 0.35, 0.30]
